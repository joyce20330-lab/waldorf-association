<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名 - 社團法人台灣華德福親子共學協會</title>
    <style>
        body { margin: 0; font-family: "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; background-color: #fcf9f2; color: #5d4e43; line-height: 1.8; display: flex; flex-direction: column; min-height: 100vh; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: #fcf9f2; border-bottom: 1px solid #e5e0dc; }
        .logo { font-weight: 500; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #5d4e43; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #d97746; }

        .hero { background-image: url('彩虹底圖.jfif'); background-size: cover; background-position: center; padding: 60px 20px; text-align: center; }
        
        .container { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
        
        /* 活動卡片網格佈局 */
        .event-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .event-card { background: white; border-radius: 16px; padding: 30px; border: 1px solid #e5e0dc; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; display: flex; flex-direction: column; }
        .event-card:hover { transform: translateY(-5px); }
        
        .event-title { font-size: 1.4rem; color: #d97746; margin-bottom: 10px; font-weight: bold; }
        .event-date { font-weight: bold; color: #8A7B6F; margin-bottom: 15px; }
        .event-desc { font-size: 0.95rem; color: #5d4e43; margin-bottom: 25px; flex-grow: 1; }
        
        .btn { display: inline-block; background: #d97746; color: white; padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: bold; text-align: center; }
        .btn:hover { background: #b86238; }

        @media (max-width: 768px) { .container { margin: 30px auto; } }
    </style>
</head>

    <nav>
