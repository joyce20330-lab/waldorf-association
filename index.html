<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社團法人台灣華德福親子共學協會</title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: #fcf9f2; 
            color: #5d4e43;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: #fcf9f2; 
            border-bottom: 1px solid #e5e0dc;
        }

        .logo { 
            font-weight: 500; 
            font-size: 1.1rem; 
            color: #5d4e43;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 25px; 
        }

        /* Applying coffee color to nav links as requested */
        .nav-links a { 
            text-decoration: none; 
            color: #5d4e43; 
            font-size: 0.9rem; 
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: #8A7B6F; }

        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(180deg, #ffede1 0%, #d6eaff 50%, #e0ffe6 100%);
            padding: 80px 20px;
        }

        h1 { font-size: 2.2rem; margin-bottom: 30px; letter-spacing: 1px; color: #5d4e43; }

        .text-content {
            max-width: 650px;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #fcf9f2;
            font-size: 0.85rem;
            color: #8A7B6F;
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; }
            .nav-links { gap: 15px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">社團法人台灣華德福親子共學協會</div>
        <div class="nav-links">
            <a href="#">首頁</a>
            <a href="#">最新消息</a>
            <a href="#">協會緣起</a>
            <a href="#">服務項目</a>
            <a href="#">活動報名</a>
            <a href="#">聯絡我們</a>
        </div>
    </nav>

    <header class="hero">
        <div class="text-content">
            <p>心靈的期盼正在萌芽<br>
            意志的行動日漸茁壯<br>
            生命的果實即將成熟<br>
            我感知我的命運<br>
            我的命運找到我<br>
            我感知我的守護星<br>
            我的守護星照耀我<br>
            我感知人生的目標<br>
            他們先後淬鍊我<br>
            我的心靈與這大千世界合一<br>
            生命的光輝日驅明亮<br>
            面對挑戰更加艱難<br>
            內心也隨之豐饒</p>
        </div>
        
        <div class="poem-footer text-sm" style="color: #8A7B6F;">
            <p>~ 魯道夫史代納 (Rudolf Steiner) ~</p>
            <p>譯者：詹雅智 • 羅葉</p>
        </div>
    </header>

    <footer>
        <p>Copyright © 2026 台灣華德福親子共學協會</p>
    </footer>

</body>
</html>
