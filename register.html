<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星禾課後照顧班 - 線上報名</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #fdfaf5; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h1 { color: #2b706c; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        
        input[type="text"], input[type="tel"], input[type="email"], select { 
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; 
        }
        
        .checkbox-group { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 5px; }
        
        .fee-display-box {
            margin-top: 15px;
            padding: 18px 20px;
            background-color: rgba(217, 119, 70, 0.08); 
            border-left: 5px solid #d97746; 
            border-radius: 6px;
            font-weight: bold;
            color: #5d4e43;
            font-size: 1.1em;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }
        .fee-amount { 
            color: #d97746; 
            font-size: 1.4em; 
            margin: 0 4px;
            text-decoration: underline;
        }

        .notice-section {
            background-color: rgba(43, 112, 108, 0.05); 
            border: 1px dashed #2b706c; 
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
            margin-bottom: 25px;
        }
        .notice-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #2b706c;
            margin-bottom: 15px;
        }
        .notice-content p {
            font-size: 0.95em;
            line-height: 1.6;
            margin: 0 0 10px 0;
            color: #444;
        }
        .notice-content p:last-child { margin-bottom: 0; }
        
        .agree-group {
            display: flex;
            align-items: flex-start;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed rgba(43, 112, 108, 0.3);
        }
        input[type="checkbox"]#agreeNotice {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .agree-label {
            display: inline;
            font-size: 1em;
            color: #e44d26; 
            font-weight: bold;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .submit-btn { 
            background-color: #2b706c; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            flex: 2; 
            font-size: 1.2em; 
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .submit-btn:hover { background-color: #1e4e4a; }

        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: transparent;
            color: #d97746; 
            border: 2px solid #d97746;
            border-radius: 5px;
            padding: 15px;
            text-decoration: none;
            flex: 1; 
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .back-btn:hover {
            background-color: #d97746;
            color: white; 
        }

        /* 滿額載入狀態與滿額提示樣式 */
        #loadingStatus { text-align: center; color: #8A7B6F; padding: 20px; font-size: 1.1em; }
        .full-message {
            display: none; text-align: center; padding: 40px 20px; background: #fff5f5;
            border: 1px solid #ffc9c9; border-radius: 10px; color: #d93838; margin-bottom: 20px;
        }
        .full-message h2 { margin-top: 0; font-size: 1.6em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>星禾課後照顧班 - 2026秋季報名表單</h1>
        
        <div id="loadingStatus">🌱 正在為您確認班級剩餘名額，請稍候...</div>

        <div id="fullMessageBlock" class="full-message">
            <h2>🌻 謝謝您的關注，本季報名已額滿</h2>
            <p>目前課後照顧班的 7 位正取名額已登記完畢。</p>
            <p style="margin-top: 15px; color: #5d4e43;">如有候補需求或最新班級資訊諮詢，歡迎隨時聯絡我們或加入LINE ID：solomon8544。</p>
            <div style="margin-top: 25px;">
                <a href="intro.html" class="back-btn" style="display:inline-block; max-width:200px; padding:10px 20px;">返回介紹頁面</a>
            </div>
        </div>

        <form id="registrationForm" style="display: none;">
            
            <div class="form-group">
                <label for="studentName">孩子姓名</label>
                <input type="text" id="studentName" name="studentName" required>
            </div>
            
            <div class="form-group">
                <label for="gender">性別</label>
                <select id="gender" name="gender" required>
                    <option value="">請選擇性別</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
