<script>
        // ✨ 請確保此處的後端 API 網址與您 Google Apps Script 部署的一致
        const backendUrl = "https://script.google.com/macros/s/AKfycbyxxtuQNQXVFfjvLN_5AvzEFKbe9_njWfiy8tVoynyVKCyJBkfAHgwxxzhK5pvSCPS6aw/exec";

        const checkboxes = document.querySelectorAll('input[name="session"]');
        const feeDisplay = document.getElementById('feeAmountDisplay');
        const feeHiddenInput = document.getElementById('calculatedFee');
        const regForm = document.getElementById('registrationForm');
        const loadingStatus = document.getElementById('loadingStatus');
        const fullMessageBlock = document.getElementById('fullMessageBlock');

        // 頁面加載時先向後台檢查人數狀態
        window.addEventListener('DOMContentLoaded', () => {
            fetch(backendUrl + '?action=checkStatus')
            .then(response => response.json())
            .then(data => {
                loadingStatus.style.display = 'none';
                if (data.status === 'full') {
                    fullMessageBlock.style.display = 'block';
                } else {
                    regForm.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('Error checking status:', error);
                loadingStatus.textContent = '系統檢查名額失敗，請重新整理網頁。';
            });
        });

        function calculateFee() {
            const checkedCount = document.querySelectorAll('input[name="session"]:checked').length;
            let totalFee = 0;
            if (checkedCount === 5) { totalFee = 17500; } 
            else if (checkedCount >= 3) { totalFee = checkedCount * 400 * 10; } 
            else if (checkedCount > 0) { totalFee = checkedCount * 450 * 10; }
            feeDisplay.textContent = totalFee.toLocaleString();
            feeHiddenInput.value = totalFee;
        }
        checkboxes.forEach(cb => cb.addEventListener('change', calculateFee));

        regForm.addEventListener('submit', function(e) {
            e.preventDefault(); 

            const checkedSessions = document.querySelectorAll('input[name="session"]:checked');
            if (checkedSessions.length === 0) {
                alert('請至少勾選一個參加的課後班時段！');
                return;
            }

            const agreeNotice = document.getElementById('agreeNotice');
            if (!agreeNotice.checked) {
                alert('請勾選同意收費標準與溫馨提醒事項！');
                return;
            }

            const submitBtn = document.querySelector('.submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '資料傳輸中，請稍候...';

            // ✨【核心優化】改用明確的鍵值對抓取欄位值，徹底防止欄位丟失或空白變 undefined
            let sessionsArray = [];
            checkedSessions.forEach(cb => sessionsArray.push(cb.value));

            const payload = {
                studentName: document.getElementById('studentName').value,
                gender: document.getElementById('gender').value,
                grade: document.getElementById('grade').value,
                session: sessionsArray.join(', '),
                calculatedFee: feeHiddenInput.value,
                parentsName: document.getElementById('parentsName').value,
                parentTel: document.getElementById('parentTel').value,
                email: document.getElementById('email').value,
                line: document.getElementById('line').value,
                agreeNotice: agreeNotice.value
            };

            // 使用 URLSearchParams 精確打包確保參數不漏
            fetch(backendUrl, {
                method: 'POST',
                body: new URLSearchParams(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === 'success') {
                    alert('🎉 報名成功！系統已將確認信發送至您的電子信箱，老師稍後也會與您聯絡。');
                    location.reload(); 
                } else if(data.result === 'full') {
                    alert('很抱歉！就在剛剛名額已滿，未能成功遞交，敬請見諒。');
                    location.reload();
                } else {
                    alert('報名系統忙碌中，請稍後再試。錯誤訊息: ' + data.error);
                }
            })
            .catch(error => {
                alert('網路連線似乎有點不穩定，請重新嘗試送出。');
                console.error('Error:', error);
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.textContent = '送出報名';
            });
        });
    </script>
